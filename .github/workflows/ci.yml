name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run prisma:validate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/liv_collab?schema=public

      - name: Lint backend
        run: npm run lint

      - name: Test backend
        run: npm run test
        env:
          PORT: 4000
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/liv_collab?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: replace-with-a-long-random-secret-at-least-32-characters
          JWT_REFRESH_SECRET: replace-with-a-different-long-random-secret-at-least-32-characters
          ACCESS_TOKEN_TTL_MINUTES: 15
          REFRESH_TOKEN_TTL_DAYS: 7
          BCRYPT_SALT_ROUNDS: 12
          REALTIME_PERSIST_DEBOUNCE_MS: 1500

      - name: Build backend
        run: npm run build

      - name: Build backend container image
        run: docker build -t liv-collab-backend:ci .

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

      - name: Build frontend container image
        run: docker build --build-arg NEXT_PUBLIC_API_URL=http://localhost:4000 -t liv-collab-frontend:ci .
